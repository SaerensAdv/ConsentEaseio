    <!-- ConsentEase: Set default consent BEFORE Google Tag Manager -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("consent", "default", {
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        analytics_storage: "denied",
        functionality_storage: "denied",
        personalization_storage: "denied",
        security_storage: "granted",
        wait_for_update: 500,
      });
      gtag("set", "ads_data_redaction", true);
      gtag("set", "url_passthrough", true);
    </script>
    <!-- ConsentEase: Load consent banner (handles user interaction) -->
    <script>
      (function () {
        var publicId = "sa003";
        var host = window.location.origin;
        var isProd =
          window.location.hostname === "consentease.io" ||
          window.location.hostname.endsWith(".consentease.io");
        var base = isProd ? "https://consentease.io" : host;
        var s = document.createElement("script");
        s.src =
          base + "/api/consent/" + publicId + "/script.js?v=" + Date.now();
        s.async = true;
        document.head.appendChild(s);
      })();
    </script>
